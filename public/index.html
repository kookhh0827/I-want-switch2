    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; padding-bottom: 100px; }
        .header { background: linear-gradient(135deg, #e60012 0%, #ff4757 100%); padding: 24px 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 1.6rem; font-weight: 900; }
        .header .subtitle { font-size: 0.85rem; opacity: 0.9; margin-top: 4px; }
        .refresh-bar { background: #1a1a2e; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a3e; }
        .last-updated { font-size: 0.75rem; color: #888; }
        .refresh-btn { background: #e60012; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
        .store-card { background: #16162a; border-radius: 16px; margin: 16px; overflow: hidden; border: 1px solid #2a2a3e; }
        .store-header { padding: 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2a3e; }
        .store-logo { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; }
        .nintendo .store-logo { background: #e60012; }
        .himart .store-logo { background: #0066cc; }
        .eleven .store-logo { background: #ff6600; }
        .store-name { font-weight: 700; font-size: 1rem; }
        .status-soldout { background: #2a1f1f; color: #ff6b6b; border: 1px solid #ff6b6b; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .status-available { background: #1f2a1f; color: #4ade80; border: 1px solid #4ade80; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .store-header { padding: 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2a3e; cursor: pointer; transition: background 0.2s; user-select: none; }
        .store-header:hover { background: #1a1a2e; }
        .store-header-left { display: flex; align-items: center; gap: 12px; flex: 1; }
        .store-header-right { display: flex; align-items: center; gap: 12px; }
        .accordion-toggle { font-size: 0.9rem; color: #888; transition: transform 0.3s ease; }
        .accordion-toggle.expanded { transform: rotate(180deg); }
        .products { padding: 0 12px; max-height: 0; overflow: hidden; opacity: 0; transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease; }
        .products.expanded { padding: 12px; max-height: 500px; opacity: 1; }
        .product-item { background: #0f0f1a; border-radius: 12px; padding: 14px; margin-bottom: 10px; display: flex; gap: 12px; }
        .product-image { width: 60px; height: 60px; background: #1a1a2e; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; }
        .product-name { font-size: 0.9rem; font-weight: 600; }
        .product-price { font-size: 0.85rem; color: #4ade80; font-weight: 700; }
        .product-stock { font-size: 0.75rem; color: #ff6b6b; }
        .go-btn { background: #e60012; color: white; padding: 10px 16px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; text-decoration: none; display: inline-block; margin-top: 8px; }
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #16162a; border-top: 1px solid #2a2a3e; padding: 12px 16px; display: flex; gap: 10px; }
        .action-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-size: 0.9rem; font-weight: 700; text-align: center; text-decoration: none; }
        .btn-primary { background: #e60012; color: white; }
        .btn-secondary { background: #2a2a3e; color: white; }
        .loading { text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #2a2a3e; border-top-color: #e60012; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

</head>
<body>
    <div class="header">
        <h1>🎮 I WANT SWITCH 2</h1>
        <div class="subtitle">닌텐도 스위치2 재고 확인</div>
    </div>
    
    <div class="refresh-bar">
        <div class="last-updated">⏱️ <span id="lastUpdate">업데이트: 로딩 중...</span></div>
        <button class="refresh-btn" onclick="refreshData()">🔄 새로고침</button>
    </div>

    <div id="content"><div class="loading"><div class="spinner"></div><p>재고 정보 로딩 중...</p></div></div>
    
    <script>
        // 정적 스토어 데이터 (링크용)
        const storeData = {
            nintendo: {
                name: '닌텐도 공식 스토어',
                logo: 'N',
                color: 'nintendo',
                products: [
                    { name: 'Nintendo Switch 2', price: '₩648,000', url: 'https://store.nintendo.co.kr/physical/switch2-products', image: '🎮' },
                    { name: 'Switch 2 마리오카트 번들', price: '₩688,000', url: 'https://store.nintendo.co.kr/physical/switch2-products', image: '🏎️' }
                ]
            },
            himart: {
                name: '하이마트',
                logo: 'H',
                color: 'himart',
                products: [
                    { name: '닌텐도 스위치2 본체', price: '₩648,000', url: 'https://m.e-himart.co.kr/app/goods/goodsDetail?goodsNo=0049455365', image: '🎮' },
                    { name: '닌텐도 스위치2 마리오카트 번들', price: '₩688,000', url: 'https://m.e-himart.co.kr/app/goods/goodsDetail?goodsNo=0049455367', image: '🏎️' }
                ]
            },
            eleven: {
                name: '11번가',
                logo: '11',
                color: 'eleven',
                products: [
                    { name: '닌텐도 스위치2 본체', price: '₩648,000', url: 'https://www.11st.co.kr/products/8369248443', image: '🎮' },
                    { name: '닌텐도 스위치2 마리오카트 번들', price: '₩688,000', url: 'https://www.11st.co.kr/products/8369253585', image: '🏎️' }
                ]
            }
        };

        // JSON 기반으로 마지막 업데이트 시간 표시 (KST 기준)
        function updateLastUpdateTime(timestamp) {
            const el = document.getElementById('lastUpdate');
            if (!timestamp) {
                el.textContent = '업데이트: 알 수 없음';
                return;
            }
            const date = new Date(timestamp);
            const timeStr = date.toLocaleString('ko-KR', {
                timeZone: 'Asia/Seoul',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            el.textContent = `업데이트: ${timeStr}`;
        }

        // 아코디언 토글 기능
        function toggleAccordion(header) {
            const products = header.nextElementSibling;
            const toggle = header.querySelector('.accordion-toggle');
            const isExpanded = products.classList.contains('expanded');
            
            // Toggle current accordion
            if (isExpanded) {
                products.classList.remove('expanded');
                toggle.classList.remove('expanded');
            } else {
                products.classList.add('expanded');
                toggle.classList.add('expanded');
            }
        }

        // GitHub에서 status.json 로드 (GitHub Pages용 - raw.githubusercontent.com) v2
        async function fetchStatus() {
            try {
                // GitHub raw content URL (CORS 허용됨)
                const response = await fetch('/status.json?' + Date.now(), {
                    cache: 'no-cache'
                });
                if (!response.ok) throw new Error('Network response was not ok');
                const status = await response.json();
                
                // JSON의 timestamp로 업데이트 시간 표시
                updateLastUpdateTime(status?.timestamp);
                renderContent(status);
            } catch (error) {
                console.error('Failed to fetch status:', error);
                document.getElementById('lastUpdate').textContent = '업데이트: 오류 - ' + error.message;
                renderFallback();
            }
        }

        function renderContent(status) {
            const content = document.getElementById('content');
            let html = '';
            
            Object.keys(storeData).forEach(key => {
                const store = storeData[key];
                const storeStatus = status?.stores?.[key];
                const isAvailable = storeStatus?.status === 'available';
                const products = storeStatus?.products;
                
                html += `
                    <div class="store-card ${store.color}">
                        <div class="store-header" onclick="toggleAccordion(this)">
                            <div class="store-header-left">
                                <div class="store-logo">${store.logo}</div>
                                <div>
                                    <div class="store-name">${store.name}</div>
                                </div>
                            </div>
                            <div class="store-header-right">
                                <div class="${isAvailable ? 'status-available' : 'status-soldout'}">
                                    ${isAvailable ? '✅ 입고' : '❌ 품절'}
                                </div>
                                <span class="accordion-toggle">▼</span>
                            </div>
                        </div>
                        <div class="products">
                            ${store.products.map((p, idx) => {
                                const productKey = idx === 0 ? 'regular' : 'bundle';
                                const inStock = products?.[productKey]?.inStock || false;
                                return `
                                <div class="product-item">
                                    <div class="product-image">${p.image}</div>
                                    <div style="flex: 1;">
                                        <div class="product-name">${p.name}</div>
                                        <div class="product-price">${p.price}</div>
                                        <div class="product-stock">${inStock ? '✅ 구매 가능' : '❌ 품절'}</div>
                                        <a href="${p.url}" target="_blank" class="go-btn">🛒 바로가기</a>
                                    </div>
                                </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            });
            
            const checkTime = status?.checkTime || new Date().toLocaleString('ko-KR');
            html += `
                <div style="text-align: center; padding: 20px; color: #666; font-size: 0.75rem;">
                    <p>⚠️ 실시간 재고 정보는 해당 사이트에서 확인하세요</p>
                    <p style="margin-top: 8px;">체크 시간: ${checkTime}</p>
                    <p style="margin-top: 4px;">30초마다 자동 새로고침</p>
                </div>
            `;
            
            content.innerHTML = html;
        }

        function renderFallback() {
            const fallbackStatus = {
                stores: {
                    nintendo: { status: 'soldout', products: { regular: { inStock: false }, bundle: { inStock: false } } },
                    himart: { status: 'soldout', products: { regular: { inStock: false }, bundle: { inStock: false } } },
                    eleven: { status: 'soldout', products: { regular: { inStock: false }, bundle: { inStock: false } } }
                }
            };
            renderContent(fallbackStatus);
        }

        function refreshData() {
            document.getElementById('lastUpdate').textContent = '업데이트: 확인 중...';
            fetchStatus();
        }

        // 초기 로드 및 주기적 새로고침
        fetchStatus();
        setInterval(fetchStatus, 30000); // 30초마다
    </script>
</body>
</html>
